            background: 'var(--bg-secondary)',
            overflow: 'hidden',
          }}>
            {!imgError ? (
              <img
                src={prompt.imageUrl}
                alt={prompt.title}
                loading="lazy"
                onLoad={() => setImgLoaded(true)}
                onError={() => setImgError(true)}
                style={{
                  position: 'absolute',
                  top: 0, left: 0,
                  width: '100%',
                  height: '100%',
                  objectFit: 'cover',
                  opacity: imgLoaded ? 1 : 0,
                  transition: 'opacity 0.3s ease',
                }}
              />
            ) : null}

            {!imgLoaded && !imgError && (
              <div style={{
                position: 'absolute', inset: 0,
                display: 'flex', alignItems: 'center', justifyContent: 'center',
                background: 'var(--bg-card)',
              }}>
                <div style={{
                  width: '24px', height: '24px',
                  border: '3px solid var(--border)',
                  borderTopColor: 'var(--accent)',
                  borderRadius: '50%',
                  animation: 'pulse 1s infinite',
                }} />
              </div>
            )}

            {imgError && (
              <div style={{
                position: 'absolute', inset: 0,
                display: 'flex', alignItems: 'center', justifyContent: 'center',
                background: 'linear-gradient(135deg, #1a1a2e, #222240)',
                color: 'var(--text-muted)', fontSize: '32px',
              }}>
                🎨
              </div>
            )}

            {/* 标签 */}
            <div style={{
              position: 'absolute', top: '10px', left: '10px',
              display: 'flex', gap: '6px',
            }}>
              {prompt.featured && (
                <span style={{
                  padding: '3px 8px', borderRadius: '6px',
                  background: 'linear-gradient(135deg, #f59e0b, #eab308)',
                  color: '#fff', fontSize: '10px', fontWeight: 700,
                }}>
                  ⭐ 精选
                </span>
              )}
              {prompt.raycastFriendly && (
                <span style={{
                  padding: '3px 8px', borderRadius: '6px',
                  background: 'rgba(0,0,0,0.6)', backdropFilter: 'blur(8px)',
                  color: '#fff', fontSize: '10px', fontWeight: 600,
                }}>
                  🚀 Raycast
                </span>
              )}
            </div>

            {/* 收藏按钮 */}
            <button
              onClick={e => { e.stopPropagation(); onToggleFavorite(); }}
              style={{
                position: 'absolute', top: '10px', right: '10px',
                width: '32px', height: '32px', borderRadius: '8px',
                background: 'rgba(0,0,0,0.5)', backdropFilter: 'blur(8px)',
                display: 'flex', alignItems: 'center', justifyContent: 'center',
                fontSize: '16px', border: 'none',
              }}
            >
              {isFavorite ? '❤️' : '🤍'}
            </button>
          </div>

          {/* 信息 */}
          <div style={{ padding: '14px' }}>
            <h3 style={{
              fontSize: '14px', fontWeight: 600, lineHeight: 1.4,
              margin: '0 0 8px',
              display: '-webkit-box', WebkitLineClamp: 2,
              WebkitBoxOrient: 'vertical', overflow: 'hidden',
            }}>
              {prompt.title || 'Untitled'}
            </h3>
            <p style={{
              fontSize: '12px', color: 'var(--text-muted)', lineHeight: 1.5,
              margin: 0,
              display: '-webkit-box', WebkitLineClamp: 2,
              WebkitBoxOrient: 'vertical', overflow: 'hidden',
            }}>
              {previewText}
            </p>

            {/* 分类标签 */}
            {(prompt.categories || []).length > 0 && (
              <div style={{ display: 'flex', gap: '4px', marginTop: '10px', flexWrap: 'wrap' }}>
                {prompt.categories.slice(0, 3).map(cat => (
                  <span key={cat} style={{
                    padding: '2px 8px', borderRadius: '4px',
                    fontSize: '10px',
                    background: 'rgba(108, 99, 255, 0.1)',
                    color: 'var(--accent)',
                  }}>
                    {cat}
                  </span>
                ))}
                {(prompt.categories?.length || 0) > 3 && (
                  <span style={{
                    padding: '2px 8px', borderRadius: '4px',
                    fontSize: '10px', color: 'var(--text-muted)',
                  }}>
                    +{prompt.categories.length - 3}
                  </span>
                )}
              </div>
            )}
          </div>
        </div>
      );
    }

    // ===== Header 组件 =====
    function Header({
      searchQuery, onSearchChange, darkMode, onToggleTheme,
      showFeaturedOnly, onToggleFeatured, total, filtered, favoritesCount
    }) {
      return (
        <header style={{
          position: 'sticky', top: 0, zIndex: 100,
          background: darkMode ? 'rgba(10,10,15,0.85)' : 'rgba(245,245,250,0.85)',
          backdropFilter: 'blur(16px) saturate(180%)',
          borderBottom: `1px solid ${darkMode ? 'rgba(255,255,255,0.06)' : 'rgba(0,0,0,0.06)'}`,
          padding: '16px 24px',
        }}>
          <div style={{
            maxWidth: '1600px', margin: '0 auto',
            display: 'flex', alignItems: 'center', gap: '16px', flexWrap: 'wrap',
          }}>
            {/* Logo */}
            <div style={{ display: 'flex', alignItems: 'center', gap: '10px', minWidth: '180px' }}>
              <span style={{ fontSize: '28px' }}>🎨</span>
              <div>
                <h1 style={{
                  fontSize: '18px', fontWeight: 700, letterSpacing: '-0.02em', margin: 0, lineHeight: 1.2,
                }}>
                  GPT-Image-2 提示词画廊
                </h1>
                <p style={{
                  fontSize: '11px', color: 'var(--text-muted)', margin: 0,
                }}>
                  {total} 个提示词 · {favoritesCount} 个收藏
                </p>
              </div>
            </div>

            {/* 搜索 */}
            <div style={{ flex: '1 1 300px', maxWidth: '560px', position: 'relative' }}>
              <span style={{
                position: 'absolute', left: '14px', top: '50%', transform: 'translateY(-50%)',
                fontSize: '16px', opacity: 0.5, pointerEvents: 'none',
              }}>🔍</span>
              <input
                type="text"
                value={searchQuery}
                onChange={e => onSearchChange(e.target.value)}
                placeholder="搜索提示词、描述、作者..."
                style={{
                  width: '100%', padding: '10px 14px 10px 40px',
                  borderRadius: '10px', border: '1px solid var(--border)',
                  background: darkMode ? 'rgba(255,255,255,0.05)' : 'rgba(0,0,0,0.03)',
                  color: 'var(--text-primary)', fontSize: '14px',
                  transition: 'all 0.25s ease',
                }}
                onFocus={e => {
                  e.target.style.borderColor = 'var(--accent)';
                  e.target.style.boxShadow = '0 0 0 3px rgba(108, 99, 255, 0.3)';
                }}
                onBlur={e => {
                  e.target.style.borderColor = 'var(--border)';
                  e.target.style.boxShadow = 'none';
                }}
              />
            </div>

            {/* 按钮 */}
            <div style={{ display: 'flex', gap: '8px', alignItems: 'center' }}>
              <button
                onClick={onToggleFeatured}
                style={{
                  padding: '8px 14px', borderRadius: '8px', fontSize: '13px', fontWeight: 500,
                  background: showFeaturedOnly ? 'var(--accent)' : 'transparent',
                  color: showFeaturedOnly ? '#fff' : 'var(--text-secondary)',
                  border: `1px solid ${showFeaturedOnly ? 'var(--accent)' : 'var(--border)'}`,
                  transition: 'all 0.25s ease',
                }}
              >
                ⭐ 精选 ({total > 0 ? filtered : 0})
              </button>
              <button
                onClick={onToggleTheme}
                style={{
                  width: '38px', height: '38px', borderRadius: '10px',
                  fontSize: '18px', display: 'flex', alignItems: 'center', justifyContent: 'center',
                  background: 'transparent', color: 'var(--text-secondary)',
                  border: '1px solid var(--border)', transition: 'all 0.25s ease',
                }}
                title={darkMode ? '切换亮色' : '切换暗色'}
              >
                {darkMode ? '☀️' : '🌙'}
              </button>
            </div>
          </div>
        </header>
      );
    }

    // ===== CategoryFilter 组件 =====
    function CategoryFilter({ selected, onSelect }) {
      const [hovered, setHovered] = useState(null);

      return (
        <div style={{
          padding: '12px 24px', display: 'flex', gap: '8px',
          overflowX: 'auto', maxWidth: '100%',
          scrollbarWidth: 'none',
        }}>
          <button
            onClick={() => onSelect(null)}
            style={{
              padding: '6px 16px', borderRadius: '20px', fontSize: '13px', fontWeight: 500,
              whiteSpace: 'nowrap',
              background: selected === null ? 'var(--accent)' : 'transparent',
              color: selected === null ? '#fff' : 'var(--text-secondary)',
              border: `1px solid ${selected === null ? 'var(--accent)' : 'var(--border)'}`,
              transition: 'all 0.25s ease',
            }}
          >
            全部
          </button>

          {CATEGORIES.map(cat => {
            const isActive = selected === cat.name;
            const isHovered = hovered === cat.name;

            return (
              <button
                key={cat.name}
                onClick={() => onSelect(isActive ? null : cat.name)}
                onMouseEnter={() => setHovered(cat.name)}
                onMouseLeave={() => setHovered(null)}
                style={{
                  padding: '6px 14px', borderRadius: '20px', fontSize: '12px', fontWeight: 500,
                  whiteSpace: 'nowrap',
                  background: isActive ? cat.color : isHovered ? `${cat.color}22` : 'transparent',
                  color: isActive ? '#fff' : isHovered ? cat.color : 'var(--text-secondary)',
                  border: `1px solid ${isActive ? cat.color : 'var(--border)'}`,
                  transition: 'all 0.25s ease',
                  transform: isHovered && !isActive ? 'scale(1.05)' : 'scale(1)',
                }}
              >
                {cat.label}
              </button>
            );
          })}
        </div>
      );
    }

    // ===== PromptDetail 组件 =====
    function PromptDetail({ prompt, onBack, isFavorite, onToggleFavorite }) {
      const [copied, setCopied] = useState(false);

      const handleCopy = async () => {
        try {
          await navigator.clipboard.writeText(prompt.prompt || '');
          setCopied(true);
          setTimeout(() => setCopied(false), 2000);
        } catch {
          const ta = document.createElement('textarea');
          ta.value = prompt.prompt || '';
          document.body.appendChild(ta);
          ta.select();
          document.execCommand('copy');
          document.body.removeChild(ta);
          setCopied(true);
          setTimeout(() => setCopied(false), 2000);
        }
      };

      return (
        <div className="animate-fade-in" style={{
          maxWidth: '1200px', margin: '0 auto', padding: '24px',
          display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '32px',
          minHeight: 'calc(100vh - 80px)',
        }}>
          {/* 左侧 */}
          <div style={{ display: 'flex', flexDirection: 'column', gap: '20px' }}>
            <button
              onClick={onBack}
              style={{
                display: 'inline-flex', alignItems: 'center', gap: '6px',
                padding: '8px 16px', borderRadius: '8px', fontSize: '13px', fontWeight: 500,
                background: 'transparent', color: 'var(--text-secondary)',
                border: '1px solid var(--border)', transition: 'all 0.25s ease',
                width: 'fit-content',
              }}
              onMouseEnter={e => { e.currentTarget.style.background = 'var(--bg-card)'; e.currentTarget.style.color = 'var(--text-primary)'; }}
              onMouseLeave={e => { e.currentTarget.style.background = 'transparent'; e.currentTarget.style.color = 'var(--text-secondary)'; }}
            >
              ← 返回画廊
            </button>

            {/* 图片 */}
            <div style={{
              borderRadius: '16px', overflow: 'hidden',
              background: 'var(--bg-card)', border: '1px solid var(--border)',
              display: 'flex', alignItems: 'center', justifyContent: 'center',
              minHeight: '300px', maxHeight: '600px',
            }}>
              <img
                src={prompt.imageUrl}
                alt={prompt.title}
                style={{ width: '100%', height: 'auto', maxHeight: '600px', objectFit: 'contain', display: 'block' }}
                onError={e => {
                  e.target.style.display = 'none';
                  e.target.parentElement.innerHTML = '<div style="padding:60px;text-align:center;color:var(--text-muted);font-size:48px;">🎨</div>';
                }}
              />
            </div>

            {/* 元信息 */}
            <div style={{ display: 'flex', gap: '16px', flexWrap: 'wrap', fontSize: '12px', color: 'var(--text-muted)' }}>
              {prompt.author && <span>✍️ {prompt.author}</span>}
              {prompt.published && <span>📅 {prompt.published}</span>}
              {prompt.language && <span>🌐 {prompt.language.toUpperCase()}</span>}
            </div>

            {/* 分类 */}
            {(prompt.categories || []).length > 0 && (
              <div style={{ display: 'flex', gap: '6px', flexWrap: 'wrap' }}>
                {prompt.categories.map(cat => (
                  <span key={cat} style={{
                    padding: '4px 10px', borderRadius: '6px', fontSize: '11px',
                    background: 'rgba(108, 99, 255, 0.1)', color: 'var(--accent)', fontWeight: 500,
                  }}>
                    {cat}
                  </span>
                ))}
              </div>
            )}
          </div>

          {/* 右侧 */}
          <div style={{ display: 'flex', flexDirection: 'column', gap: '20px' }}>
            <div>
              <h2 style={{ fontSize: '24px', fontWeight: 700, lineHeight: 1.3, marginBottom: '8px' }}>
                {prompt.title || 'Untitled'}
              </h2>
              {prompt.description && (
                <p style={{ fontSize: '15px', color: 'var(--text-secondary)', lineHeight: 1.7 }}>
                  {prompt.description}
                </p>
              )}
            </div>

            {/* Prompt 代码块 */}
            <div style={{
              position: 'relative', background: 'var(--bg-card)',
              borderRadius: '14px', border: '1px solid var(--border)', overflow: 'hidden',
            }}>
              <div style={{
                display: 'flex', justifyContent: 'space-between', alignItems: 'center',
                padding: '10px 16px', borderBottom: '1px solid var(--border)',
              }}>
                <span style={{
                  fontSize: '12px', fontWeight: 600, color: 'var(--text-muted)',
                  textTransform: 'uppercase', letterSpacing: '0.05em',
                }}>
                  📝 Prompt
                </span>
                <button
                  onClick={handleCopy}
                  style={{
                    padding: '5px 12px', borderRadius: '6px', fontSize: '12px', fontWeight: 500,
                    background: copied ? 'var(--success)' : 'var(--accent)',
                    color: '#fff', transition: 'all 0.25s ease',
                  }}
                >
                  {copied ? '✅ 已复制' : '📋 复制'}
                </button>
              </div>
              <div style={{ padding: '16px', maxHeight: '400px', overflow: 'auto' }}>
                <pre style={{
                  fontSize: '13px', lineHeight: 1.7, color: 'var(--text-primary)',
                  whiteSpace: 'pre-wrap', wordBreak: 'break-word',
                  fontFamily: "'SF Mono', 'Fira Code', 'Cascadia Code', monospace",
                }}>
                  {prompt.prompt}
                </pre>
              </div>
            </div>

            {/* 操作按钮 */}
            <div style={{ display: 'flex', gap: '10px' }}>
              <button
                onClick={onToggleFavorite}
                style={{
                  flex: 1, padding: '12px', borderRadius: '10px', fontSize: '14px', fontWeight: 600,
                  background: isFavorite ? 'linear-gradient(135deg, #ff6b6b, #ee5a24)' : 'var(--bg-card)',
                  color: isFavorite ? '#fff' : 'var(--text-secondary)',
                  border: isFavorite ? 'none' : '1px solid var(--border)',
                  transition: 'all 0.25s ease',
                }}
              >
                {isFavorite ? '❤️ 已收藏' : '🤍 收藏'}
              </button>
              {prompt.source && prompt.author && (
                <button style={{
                  padding: '12px 20px', borderRadius: '10px', fontSize: '13px', fontWeight: 500,
                  background: 'var(--bg-card)', color: 'var(--text-secondary)',
                  border: '1px solid var(--border)', transition: 'all 0.25s ease',
                }}>
                  🔗 {prompt.author} · {prompt.source}
                </button>
              )}
            </div>
          </div>
        </div>
      );
    }

    // ===== 主 App =====
    function App() {
      const [searchQuery, setSearchQuery] = useState('');
      const [selectedCategory, setSelectedCategory] = useState(null);
      const [selectedPrompt, setSelectedPrompt] = useState(null);
      const [showFeaturedOnly, setShowFeaturedOnly] = useState(false);
      const [favorites, setFavorites] = useState(() => {
        try { return new Set(JSON.parse(localStorage.getItem('gpt-image-favs') || '[]')); }
        catch { return new Set(); }
      });

      const [darkMode, setDarkMode] = useState(() => {
        const saved = localStorage.getItem('gpt-image-theme');
        return saved ? saved === 'dark' : true;
      });

      // 应用主题
      useEffect(() => {
        document.documentElement.setAttribute('data-theme', darkMode ? 'dark' : 'light');
        localStorage.setItem('gpt-image-theme', darkMode ? 'dark' : 'light');
      }, [darkMode]);

      const toggleFavorite = (id) => {
        const next = new Set(favorites);
        if (next.has(id)) next.delete(id);
        else next.add(id);
        setFavorites(next);
        localStorage.setItem('gpt-image-favs', JSON.stringify(Array.from(next)));
      };

      const filteredPrompts = useMemo(() => {
        let result = PROMPTS;
        if (searchQuery.trim()) {
          const q = searchQuery.toLowerCase().trim();
          result = result.filter(p =>
            p.title?.toLowerCase().includes(q) ||
            p.prompt?.toLowerCase().includes(q) ||
            p.description?.toLowerCase().includes(q) ||
            p.author?.toLowerCase().includes(q)
          );
        }
        if (selectedCategory) {
          result = result.filter(p => (p.categories || []).includes(selectedCategory));
        }
        if (showFeaturedOnly) {
          result = result.filter(p => p.featured);
        }
        return result;
      }, [searchQuery, selectedCategory, showFeaturedOnly]);

      return (
        <div style={{ minHeight: '100vh' }}>
          <Header
            searchQuery={searchQuery}
            onSearchChange={setSearchQuery}
            darkMode={darkMode}
            onToggleTheme={() => setDarkMode(!darkMode)}
            showFeaturedOnly={showFeaturedOnly}
            onToggleFeatured={() => setShowFeaturedOnly(!showFeaturedOnly)}
            total={PROMPTS.length}
            filtered={filteredPrompts.length}
            favoritesCount={favorites.size}
          />

          {!selectedPrompt && (
            <CategoryFilter
              selected={selectedCategory}
              onSelect={setSelectedCategory}
            />
          )}

          {selectedPrompt && (
            <PromptDetail
              prompt={selectedPrompt}
              onBack={() => setSelectedPrompt(null)}
              isFavorite={favorites.has(selectedPrompt.id)}
              onToggleFavorite={() => toggleFavorite(selectedPrompt.id)}
            />
          )}

          {!selectedPrompt && (
            <div style={{
              padding: '0 24px 60px',
              columns: '4 280px', columnGap: '20px',
            }}>
              {filteredPrompts.map((prompt, i) => (
                <div
                  key={prompt.id}
                  className="animate-fade-in"
                  style={{
                    breakInside: 'avoid', marginBottom: '20px',
                    animationDelay: `${Math.min(i * 30, 400)}ms`,
                  }}
                >
                  <Card
                    prompt={prompt}
                    isFavorite={favorites.has(prompt.id)}
                    onClick={() => setSelectedPrompt(prompt)}
                    onToggleFavorite={() => toggleFavorite(prompt.id)}
                  />
                </div>
              ))}

              {filteredPrompts.length === 0 && (
                <div style={{
                  gridColumn: '1 / -1', textAlign: 'center',
                  padding: '80px 20px', color: 'var(--text-muted)',
                }}>
                  <div style={{ fontSize: '48px', marginBottom: '16px' }}>🔍</div>
                  <div style={{ fontSize: '18px' }}>没有找到匹配的提示词</div>
                  <div style={{ fontSize: '14px', marginTop: '8px' }}>
                    试试其他关键词或清除过滤器
                  </div>
                </div>
              )}
            </div>
          )}
        </div>
      );
    }

    // 挂载
    const root = document.getElementById('root');
    if (root) {
      ReactDOM.createRoot(root).render(
        <React.StrictMode>
          <App />
        </React.StrictMode>
      );
    }
  </script>
</body>
</html>
